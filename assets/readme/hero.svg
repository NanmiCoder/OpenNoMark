<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">OpenNoMark — local, inspectable watermark removal</title>
  <desc id="desc">A warm editorial hero showing OpenNoMark localizing a visible corner mark, rebuilding the masked region, and verifying the cleaned image.</desc>

  <rect width="1200" height="400" rx="28" fill="#F3F1EB"/>
  <path d="M526 32V368" stroke="#DCD9D0"/>

  <g transform="translate(54 42)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <g transform="translate(2 3)">
      <rect x="6" y="6" width="34" height="34" rx="9" fill="#FBFAF7" stroke="#C8C4B9" transform="rotate(45 23 23)"/>
      <path d="M15 23H31M23 15V31" stroke="#147D72" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="23" cy="23" r="2.5" fill="#147D72"/>
    </g>
    <text x="58" y="18" fill="#242522" font-size="17" font-weight="700">OPENNOMARK</text>
    <text x="58" y="40" fill="#147D72" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="2">LOCAL IMAGE REPAIR · BATCH WORKBENCH</text>

    <text x="0" y="126" fill="#242522" font-size="66" font-weight="750" letter-spacing="-2.5">OpenNoMark</text>
    <text x="0" y="177" fill="#242522" font-size="31" font-weight="650" letter-spacing="-0.8">Remove the mark. Keep the image.</text>
    <text x="0" y="216" fill="#676963" font-size="18">Visible corner watermarks, rebuilt locally</text>
    <text x="0" y="243" fill="#676963" font-size="18">and checked again before the result is trusted.</text>

    <g transform="translate(0 286)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="1.2">
      <rect width="119" height="38" rx="19" fill="#E1EFEB"/>
      <text x="59.5" y="24" fill="#0D675F" text-anchor="middle">LOCAL</text>
      <rect x="130" width="119" height="38" rx="19" fill="#FBFAF7" stroke="#DCD9D0"/>
      <text x="189.5" y="24" fill="#676963" text-anchor="middle">BATCH</text>
      <rect x="260" width="164" height="38" rx="19" fill="#FBFAF7" stroke="#DCD9D0"/>
      <text x="342" y="24" fill="#676963" text-anchor="middle">INSPECTABLE</text>
    </g>
  </g>

  <g transform="translate(558 32)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <rect width="610" height="336" rx="24" fill="#FBFAF7" stroke="#DCD9D0"/>
    <text x="26" y="35" fill="#242522" font-size="16" font-weight="700">ONE REGION CONTRACT</text>
    <text x="584" y="35" fill="#676963" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" text-anchor="end">PIXELS IN · VERIFIED IMAGE OUT</text>
    <path d="M26 52H584" stroke="#E9E6DE"/>

    <g transform="translate(26 72)">
      <rect width="166" height="212" rx="18" fill="#F3F1EB" stroke="#DCD9D0"/>
      <text x="16" y="29" fill="#676963" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="1">01 · LOCALIZE</text>
      <rect x="16" y="46" width="134" height="142" rx="12" fill="#DDEBF0"/>
      <circle cx="45" cy="76" r="14" fill="#F8F1D7"/>
      <path d="M16 135C48 111 75 126 101 111C120 101 136 103 150 112V188H16Z" fill="#CBD2C9"/>
      <path d="M16 158C52 145 80 154 111 139C126 132 139 134 150 139V188H16Z" fill="#AEB9B0"/>
      <path d="M125 137L130 148L141 153L130 158L125 169L120 158L109 153L120 148Z" fill="#FBFAF7" stroke="#676963" stroke-width="1.5"/>
      <rect x="103" y="131" width="44" height="44" rx="7" fill="none" stroke="#147D72" stroke-width="2" stroke-dasharray="5 4"/>
    </g>

    <path d="M204 176H220" stroke="#C8C4B9" stroke-width="2" stroke-linecap="round"/>
    <path d="M216 171L221 176L216 181" fill="none" stroke="#C8C4B9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(222 72)">
      <rect width="166" height="212" rx="18" fill="#F3F1EB" stroke="#DCD9D0"/>
      <text x="16" y="29" fill="#676963" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="1">02 · REBUILD</text>
      <rect x="16" y="46" width="134" height="142" rx="12" fill="#DDEBF0"/>
      <circle cx="45" cy="76" r="14" fill="#F8F1D7"/>
      <path d="M16 135C48 111 75 126 101 111C120 101 136 103 150 112V188H16Z" fill="#CBD2C9"/>
      <path d="M16 158C52 145 80 154 111 139C126 132 139 134 150 139V188H16Z" fill="#AEB9B0"/>
      <rect x="103" y="131" width="44" height="44" rx="7" fill="#E1EFEB" stroke="#147D72" stroke-width="2"/>
      <path d="M109 155C118 145 126 146 141 138M109 165C121 154 132 155 142 149" fill="none" stroke="#147D72" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    </g>

    <path d="M400 176H416" stroke="#C8C4B9" stroke-width="2" stroke-linecap="round"/>
    <path d="M412 171L417 176L412 181" fill="none" stroke="#C8C4B9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(418 72)">
      <rect width="166" height="212" rx="18" fill="#F3F1EB" stroke="#DCD9D0"/>
      <text x="16" y="29" fill="#676963" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="1">03 · VERIFY</text>
      <rect x="16" y="46" width="134" height="142" rx="12" fill="#DDEBF0"/>
      <circle cx="45" cy="76" r="14" fill="#F8F1D7"/>
      <path d="M16 135C48 111 75 126 101 111C120 101 136 103 150 112V188H16Z" fill="#CBD2C9"/>
      <path d="M16 158C52 145 80 154 111 139C126 132 139 134 150 139V188H16Z" fill="#AEB9B0"/>
      <circle cx="126" cy="64" r="15" fill="#147D72"/>
      <path d="M119 64L124 69L133 59" fill="none" stroke="#FBFAF7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="305" y="313" fill="#676963" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" text-anchor="middle" letter-spacing="0.8">FILENAME-INDEPENDENT · COMPACT MASK · RESIDUAL CHECKED</text>
  </g>
</svg>
